<svg xmlns="http://www.w3.org/2000/svg" width="650" height="320" viewBox="0 0 650 320">
  <style>
    .bg { fill: #2E3440; rx: 8px; } /* Dark terminal background */
    .text { font-family: 'Consolas', 'Courier New', monospace; font-size: 15px; opacity: 0; animation: appear 0.1s forwards; }
    .cmd { fill: #A3BE8C; font-weight: bold; } /* Green for commands */
    .out { fill: #D8DEE9; } /* Light grey for output */
    .str { fill: #EBCB8B; font-style: italic; } /* Yellow for strings */
    
    @keyframes appear { to { opacity: 1; } }
    
    .l1  { animation-delay: 0.5s; }
    .l2  { animation-delay: 1.2s; }
    .l3  { animation-delay: 2.0s; }
    .l4  { animation-delay: 2.5s; }
    .l5  { animation-delay: 2.7s; }
    .l6  { animation-delay: 3.8s; }
    .l7  { animation-delay: 4.5s; }
    .l8  { animation-delay: 4.7s; }
    .l9  { animation-delay: 5.8s; }
    .l10 { animation-delay: 6.5s; }
    .l11 { animation-delay: 6.7s; }
  </style>

  <rect width="100%" height="100%" class="bg" />
  

  <circle cx="20" cy="20" r="6" fill="#BF616A" />
  <circle cx="40" cy="20" r="6" fill="#EBCB8B" />
  <circle cx="60" cy="20" r="6" fill="#A3BE8C" />

  <text x="20" y="60" class="text cmd l1">$ whoami</text>
  <text x="20" y="85" class="text out l2">&gt; Pancho</text>

  <text x="20" y="120" class="text cmd l3">$ ls</text>
  <text x="20" y="145" class="text out l4">&gt; about.txt</text>
  <text x="20" y="165" class="text out l5">&gt; work.sh</text>

  <text x="20" y="200" class="text cmd l6">$ cat about.txt</text>
  <text x="20" y="225" class="text str l7">&gt; "I have concluded that the torments of adversity"</text>
  <text x="20" y="245" class="text str l8">&gt; "refine my strength."</text>

  <text x="20" y="280" class="text cmd l9">$ ./work.sh</text>
  <text x="20" y="305" class="text out l10">&gt; [1] Kiriko - companion :)</text>
  <text x="20" y="325" class="text out l11">&gt; [2] Terminal Tools 42</text>
</svg>
