<svg xmlns="http://www.w3.org/2000/svg" width="650" height="360" viewBox="0 0 650 360">
  <style>
    /* Standard GitHub Markdown Code Block Styling */
    .bg { fill: #0d1117; rx: 6px; } 
    .text { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace; font-size: 15px; fill: #e6edf3; }
    
    /* Syntax Highlighting */
    .prompt { fill: #79c0ff; font-weight: bold; } 
    .cmd { fill: #d2a8ff; } 
    .out { fill: #8b949e; } 
    .str { fill: #a5d6ff; } 
    
    /* Instant appear for static outputs */
    .line { opacity: 0; animation: appear 0.1s forwards; }
    @keyframes appear { to { opacity: 1; } }
    
    /* Character-by-character typing mask for commands */
    .type-mask { width: 0; animation: wipe forwards; }
    @keyframes wipe { to { width: 100%; } }
    
    /* Sequence Timing - Steps() mimic the individual keystrokes */
    .m1 { animation-delay: 0.5s; animation-duration: 0.5s; animation-timing-function: steps(10, end); }
    .l2 { animation-delay: 1.2s; }
    
    .m3 { animation-delay: 2.2s; animation-duration: 0.3s; animation-timing-function: steps(5, end); }
    .l4 { animation-delay: 2.7s; }
    .l5 { animation-delay: 2.8s; }
    
    .m6 { animation-delay: 4.0s; animation-duration: 0.7s; animation-timing-function: steps(20, end); }
    .l7 { animation-delay: 4.9s; }
    .l8 { animation-delay: 5.0s; }
    
    .m9 { animation-delay: 6.2s; animation-duration: 0.6s; animation-timing-function: steps(15, end); }
    .l10 { animation-delay: 7.0s; }
    .l11 { animation-delay: 7.1s; }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <defs>
    <clipPath id="c1"><rect x="20" y="20" height="30" class="type-mask m1" /></clipPath>
    <clipPath id="c3"><rect x="20" y="85" height="30" class="type-mask m3" /></clipPath>
    <clipPath id="c6"><rect x="20" y="175" height="30" class="type-mask m6" /></clipPath>
    <clipPath id="c9"><rect x="20" y="265" height="30" class="type-mask m9" /></clipPath>
  </defs>

  <text x="20" y="40" class="text" clip-path="url(#c1)"><tspan class="prompt">$ </tspan><tspan class="cmd">whoami</tspan></text>
  <text x="20" y="65" class="text out line l2">&gt; Pancho</text>

  <text x="20" y="105" class="text" clip-path="url(#c3)"><tspan class="prompt">$ </tspan><tspan class="cmd">ls</tspan></text>
  <text x="20" y="130" class="text out line l4">&gt; about.txt</text>
  <text x="20" y="155" class="text out line l5">&gt; work.sh</text>

  <text x="20" y="195" class="text" clip-path="url(#c6)"><tspan class="prompt">$ </tspan><tspan class="cmd">cat about.txt</tspan></text>
  <text x="20" y="220" class="text str line l7">&gt; "I have concluded that the torments of adversity"</text>
  <text x="20" y="245" class="text str line l8">&gt; "refine my strength."</text>

  <text x="20" y="285" class="text" clip-path="url(#c9)"><tspan class="prompt">$ </tspan><tspan class="cmd">./work.sh</tspan></text>
  <text x="20" y="310" class="text out line l10">&gt; [1] Kiriko - companion :)</text>
  <text x="20" y="335" class="text out line l11">&gt; [2] Terminal Tools 42</text>
</svg>
