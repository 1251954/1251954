<svg xmlns="http://www.w3.org/2000/svg" width="650" height="400" viewBox="0 0 650 400">
  <style>
    .bg { fill: #0d1117; rx: 6px; } 
    .text { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; font-size: 15px; fill: #e6edf3; }
    .prompt { fill: #79c0ff; font-weight: bold; } 
    .cmd { fill: #d2a8ff; } 
    .out { fill: #8b949e; } 
    .str { fill: #a5d6ff; } 
    .line { opacity: 0; animation: pop 0.1s forwards; }
    @keyframes pop { to { opacity: 1; } }
    .cursor { fill: #e6edf3; animation: blink 0.8s infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes s1 { 0% { transform: translateX(0); } 95% { transform: translateX(60px); opacity: 1; } 100% { transform: translateX(60px); opacity: 0; } }
    @keyframes s3 { 0% { transform: translateX(0); } 95% { transform: translateX(25px); opacity: 1; } 100% { transform: translateX(25px); opacity: 0; } }
    @keyframes s6 { 0% { transform: translateX(0); } 95% { transform: translateX(125px); opacity: 1; } 100% { transform: translateX(125px); opacity: 0; } }
    @keyframes s9 { 0% { transform: translateX(0); } 95% { transform: translateX(90px); opacity: 1; } 100% { transform: translateX(90px); opacity: 0; } }
    .l1 { animation-delay: 0.5s; }
    .c1 { animation: s1 0.6s ease-out forwards; animation-delay: 1.0s; }
    .l2 { animation-delay: 1.8s; }
    .l3 { animation-delay: 2.5s; }
    .c3 { animation: s3 0.3s ease-out forwards; animation-delay: 3.0s; }
    .l4 { animation-delay: 3.5s; }
    .l5 { animation-delay: 3.6s; }
    .l6 { animation-delay: 4.4s; }
    .c6 { animation: s6 1.0s ease-out forwards; animation-delay: 4.9s; }
    .l7 { animation-delay: 6.1s; }
    .l8 { animation-delay: 6.2s; }
    .l9 { animation-delay: 7.0s; }
    .c9 { animation: s9 0.8s ease-out forwards; animation-delay: 7.5s; }
    .l10 { animation-delay: 8.5s; }
    .l11 { animation-delay: 8.6s; }
    .final { animation-delay: 9.2s; }
  </style>
  <rect width="100%" height="100%" class="bg" />
  <text x="20" y="40" class="text line l1"><tspan class="prompt">$ </tspan><tspan class="cmd">whoami</tspan></text>
  <g class="line l1"><g class="c1"><rect x="38" y="26" width="100" height="18" fill="#0d1117" /><rect x="38" y="27" width="8" height="15" class="cursor" /></g></g>
  <text x="20" y="65" class="text out line l2">&gt; Pancho</text>
  <text x="20" y="105" class="text line l3"><tspan class="prompt">$ </tspan><tspan class="cmd">ls</tspan></text>
  <g class="line l3"><g class="c3"><rect x="38" y="91" width="100" height="18" fill="#0d1117" /><rect x="38" y="92" width="8" height="15" class="cursor" /></g></g>
  <text x="20" y="130" class="text out line l4">&gt; about.txt</text>
  <text x="20" y="155" class="text out line l5">&gt; work.sh</text>
  <text x="20" y="195" class="text line l6"><tspan class="prompt">$ </tspan><tspan class="cmd">cat about.txt</tspan></text>
  <g class="line l6"><g class="c6"><rect x="38" y="181" width="150" height="18" fill="#0d1117" /><rect x="38" y="182" width="8" height="15" class="cursor" /></g></g>
  <text x="20" y="220" class="text str line l7">&gt; "I have concluded that the torments of adversity"</text>
  <text x="20" y="245" class="text str line l8">&gt; "refine my strength."</text>
  <text x="20" y="285" class="text line l9"><tspan class="prompt">$ </tspan><tspan class="cmd">./work.sh</tspan></text>
  <g class="line l9"><g class="c9"><rect x="38" y="271" width="120" height="18" fill="#0d1117" /><rect x="38" y="272" width="8" height="15" class="cursor" /></g></g>
  <text x="20" y="310" class="text out line l10">&gt; [1] Kiriko - companion :)</text>
  <text x="20" y="335" class="text out line l11">&gt; [2] Terminal Tools 42</text>
  <text x="20" y="375" class="text line final"><tspan class="prompt">$ </tspan></text>
  <rect x="38" y="362" width="8" height="15" class="cursor line final" />
</svg>
