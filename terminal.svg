<svg xmlns="http://www.w3.org/2000/svg" width="650" height="400" viewBox="0 0 650 400">
  <style>
    :root { --bg: #0d1117; --text: #e6edf3; --prompt: #79c0ff; --cmd: #d2a8ff; --out: #8b949e; --str: #a5d6ff; --cursor-color: #79c0ff; }
    @media (prefers-color-scheme: light) {
      :root { --bg: #ffffff; --text: #24292f; --prompt: #0969da; --cmd: #8250df; --out: #57606a; --str: #0550ae; --cursor-color: #0969da; }
    }
    .bg { fill: transparent; } 
    .text { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; font-size: 15px; fill: var(--text); }
    .prompt { fill: var(--prompt); font-weight: bold; } 
    .cmd { fill: var(--cmd); } 
    .out { fill: var(--out); } 
    .str { fill: var(--str); } 
    .cursor { fill: var(--cursor-color); animation: blink 0.8s infinite; }
    
    .line { opacity: 0; animation: pop 0.1s forwards; }
    @keyframes pop { to { opacity: 1; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    /* Typing animations: Scaled distances to match character counts */
    @keyframes s1 { 0% { transform: translateX(0); opacity: 1; } 95% { transform: translateX(70px); opacity: 1; } 100% { transform: translateX(70px); opacity: 0; } }
    @keyframes s3 { 0% { transform: translateX(0); opacity: 1; } 95% { transform: translateX(30px); opacity: 1; } 100% { transform: translateX(30px); opacity: 0; } }
    @keyframes s6 { 0% { transform: translateX(0); opacity: 1; } 95% { transform: translateX(150px); opacity: 1; } 100% { transform: translateX(150px); opacity: 0; } }
    @keyframes s9 { 0% { transform: translateX(0); opacity: 1; } 95% { transform: translateX(110px); opacity: 1; } 100% { transform: translateX(110px); opacity: 0; } }
    
    .cursor-group { opacity: 0; }
    
    /* Timing: Synchronized all typing commands */
    /* whoami */
    .c1 { animation: s1 0.6s ease-out forwards; animation-delay: 0.5s; }
    .l1 { animation-delay: 0.5s; } 
    
    /* ls */
    .c3 { animation: s3 0.3s ease-out forwards; animation-delay: 2.5s; }
    .l3 { animation-delay: 2.5s; } 
    
    /* cat */
    .c6 { animation: s6 1.2s ease-out forwards; animation-delay: 4.4s; }
    .l6 { animation-delay: 4.4s; } 
    
    /* ./work.sh */
    .c9 { animation: s9 0.9s ease-out forwards; animation-delay: 7.0s; }
    .l9 { animation-delay: 7.0s; }
    
    /* Output timing */
    .l2 { animation-delay: 1.5s; } .l4 { animation-delay: 3.2s; } .l5 { animation-delay: 3.3s; }
    .l7 { animation-delay: 6.0s; } .l8 { animation-delay: 6.1s; } .l10 { animation-delay: 8.5s; } .l11 { animation-delay: 8.6s; }
    
    /* Final elements */
    .final-show { opacity: 0; animation: pop 0.1s forwards 9.2s; }
    .final-blink { opacity: 0; fill: var(--cursor-color); animation: pop 0.1s forwards 9.2s, blink 0.8s infinite 9.2s; }
  </style>
  <rect width="100%" height="100%" class="bg" />
  
  <text x="20" y="40" class="text line l1"><tspan class="prompt">$ </tspan><tspan class="cmd">whoami</tspan></text>
  <g class="cursor-group c1"><rect x="38" y="26" width="100" height="18" fill="var(--bg)" /><rect x="38" y="27" width="8" height="15" class="cursor" /></g>
  <text x="20" y="65" class="text out line l2">&gt; Pancho</text>
  
  <text x="20" y="105" class="text line l3"><tspan class="prompt">$ </tspan><tspan class="cmd">ls</tspan></text>
  <g class="cursor-group c3"><rect x="38" y="91" width="100" height="18" fill="var(--bg)" /><rect x="38" y="92" width="8" height="15" class="cursor" /></g>
  <text x="20" y="130" class="text out line l4">&gt; about.txt</text>
  <text x="20" y="155" class="text out line l5">&gt; work.sh</text>
  
  <text x="20" y="195" class="text line l6"><tspan class="prompt">$ </tspan><tspan class="cmd">cat about.txt</tspan></text>
  <g class="cursor-group c6"><rect x="38" y="181" width="150" height="18" fill="var(--bg)" /><rect x="38" y="182" width="8" height="15" class="cursor" /></g>
  <text x="20" y="220" class="text str line l7">&gt; "I have concluded that the torments of adversity"</text>
  <text x="20" y="245" class="text str line l8">&gt; "refine my strength."</text>
  
  <text x="20" y="285" class="text line l9"><tspan class="prompt">$ </tspan><tspan class="cmd">./work.sh</tspan></text>
  <g class="cursor-group c9"><rect x="38" y="271" width="120" height="18" fill="var(--bg)" /><rect x="38" y="272" width="8" height="15" class="cursor" /></g>
  <text x="20" y="310" class="text out line l10">&gt; [1] Kiriko - companion :)</text>
  <text x="20" y="335" class="text out line l11">&gt; [2] Terminal Tools 42</text>
  
  <text x="20" y="375" class="text final-show"><tspan class="prompt">$ </tspan></text>
  <rect x="38" y="362" width="8" height="15" class="final-blink" />
</svg>
