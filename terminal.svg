<svg xmlns="http://www.w3.org/2000/svg" width="650" height="400" viewBox="0 0 650 400">
  <style>
    /* (dark mode) */
    :root { --bg: #1a1b26;
    --text: #dcdfe4;
    --prompt: #e95678;
    --cmd: #fab387;
    --out: #9299a8;
    --str: #c0caf5;
    --cursor-color: #e95678; }
    
    /* (light mode) */
    @media (prefers-color-scheme: light) {
      :root { --bg: #eff1f5;
    --text: #4c4f69;
    --prompt: #1e66f5;
    --cmd: #8839ef;
    --out: #6c6f85;
    --str: #40a02b;
    --cursor-color: #1e66f5; }
    }
    .bg { fill: black; }
    .text { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; font-size: 15px; fill: var(--text); }
    .prompt { fill: var(--prompt); font-weight: bold; }
    .cmd { fill: var(--cmd); }
    .out { fill: var(--out); }
    .str { fill: var(--str); }

    /* ---- shared animation ---- */
    .line { opacity: 0; animation: pop 0.1s forwards; }
    @keyframes pop { to { opacity: 1; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    .l1  { animation-delay: 0.3s; }
    .l3  { animation-delay: 2.3s; }
    .l6  { animation-delay: 4.0s; }
    .l9  { animation-delay: 7.0s; }
    .l2  { animation-delay: 1.6s; }
    .l4  { animation-delay: 3.1s; }
    .l5  { animation-delay: 3.3s; }
    .l7  { animation-delay: 6.0s; }
    .l8  { animation-delay: 6.2s; }
    .l10 { animation-delay: 8.6s; }
    .l11 { animation-delay: 8.8s; }

    /* ---- cursor: a block cursor that LEADS the revealed text ----
       Each cursor has two independent animations:
       - kfVisN : opacity, appears, holds solid, fades out (no blink while "typing")
       - kfPosN : transform translateX, steps(N) so it jumps one character-width
                  at a time, exactly in sync with the text reveal below */
    .cursor { fill: var(--cursor-color); opacity: 0; }

    @keyframes kfVis1 { 0% { opacity: 0; } 1% { opacity: 1; } 92.308% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes kfVis3 { 0% { opacity: 0; } 1% { opacity: 1; } 87.5%   { opacity: 1; } 100% { opacity: 0; } }
    @keyframes kfVis6 { 0% { opacity: 0; } 1% { opacity: 1; } 95%     { opacity: 1; } 100% { opacity: 0; } }
    @keyframes kfVis9 { 0% { opacity: 0; } 1% { opacity: 1; } 93.75%  { opacity: 1; } 100% { opacity: 0; } }

    @keyframes kfPos1 { from { transform: translateX(0); } to { transform: translateX(54px); } }
    @keyframes kfPos3 { from { transform: translateX(0); } to { transform: translateX(18px); } }
    @keyframes kfPos6 { from { transform: translateX(0); } to { transform: translateX(117px); } }
    @keyframes kfPos9 { from { transform: translateX(0); } to { transform: translateX(81px); } }

    .cursor1 { animation: kfPos1 0.6s steps(6,end) 0.5s forwards, kfVis1 1.3s linear 0.3s forwards; }
    .cursor3 { animation: kfPos3 0.2s steps(2,end) 2.5s forwards, kfVis3 0.8s linear 2.3s forwards; }
    .cursor6 { animation: kfPos6 1.3s steps(13,end) 4.2s forwards, kfVis6 2.0s linear 4.0s forwards; }
    .cursor9 { animation: kfPos9 0.9s steps(9,end) 7.2s forwards, kfVis9 1.6s linear 7.0s forwards; }

    /* ---- text reveal: clip-path rect grows in lockstep (steps) with the cursor ---- */
    .reveal { width: 0; }
    @keyframes kfReveal1 { from { width: 0; } to { width: 54px; } }
    @keyframes kfReveal3 { from { width: 0; } to { width: 18px; } }
    @keyframes kfReveal6 { from { width: 0; } to { width: 117px; } }
    @keyframes kfReveal9 { from { width: 0; } to { width: 81px; } }

    .reveal1 { animation: kfReveal1 0.6s steps(6,end) 0.5s forwards; }
    .reveal3 { animation: kfReveal3 0.2s steps(2,end) 2.5s forwards; }
    .reveal6 { animation: kfReveal6 1.3s steps(13,end) 4.2s forwards; }
    .reveal9 { animation: kfReveal9 0.9s steps(9,end) 7.2s forwards; }

    /* ---- final idle prompt: classic blinking cursor, no typing ---- */
    .final-show  { opacity: 0; animation: pop 0.1s forwards 9.3s; }
    .final-blink { opacity: 0; fill: var(--cursor-color); animation: pop 0.1s forwards 9.3s, blink 0.8s infinite 9.3s; }
  </style>

  <defs>
    <clipPath id="clipWhoami"><rect x="38" y="25" width="0" height="20" class="reveal reveal1" /></clipPath>
    <clipPath id="clipLs"><rect x="38" y="90" width="0" height="20" class="reveal reveal3" /></clipPath>
    <clipPath id="clipCat"><rect x="38" y="180" width="0" height="20" class="reveal reveal6" /></clipPath>
    <clipPath id="clipWork"><rect x="38" y="270" width="0" height="20" class="reveal reveal9" /></clipPath>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- whoami -->
  <text x="20" y="40" class="text prompt line l1">$ </text>
  <text x="38" y="40" class="text cmd" textLength="54" lengthAdjust="spacingAndGlyphs" clip-path="url(#clipWhoami)">whoami</text>
  <rect class="cursor cursor1" x="38" y="27" width="8" height="15" />
  <text x="20" y="65" class="text out line l2">&gt; Pancho</text>

  <!-- ls -->
  <text x="20" y="105" class="text prompt line l3">$ </text>
  <text x="38" y="105" class="text cmd" textLength="18" lengthAdjust="spacingAndGlyphs" clip-path="url(#clipLs)">ls</text>
  <rect class="cursor cursor3" x="38" y="92" width="8" height="15" />
  <text x="20" y="130" class="text out line l4">&gt; about.txt</text>
  <text x="20" y="155" class="text out line l5">&gt; work.sh</text>

  <!-- cat about.txt -->
  <text x="20" y="195" class="text prompt line l6">$ </text>
  <text x="38" y="195" class="text cmd" textLength="117" lengthAdjust="spacingAndGlyphs" clip-path="url(#clipCat)">cat about.txt</text>
  <rect class="cursor cursor6" x="38" y="182" width="8" height="15" />
  <text x="20" y="220" class="text str line l7">&gt; "I have concluded that the torments of adversity</text>
  <text x="20" y="245" class="text str line l8">&gt; refine my strength."</text>

  <!-- ./work.sh -->
  <text x="20" y="285" class="text prompt line l9">$ </text>
  <text x="38" y="285" class="text cmd" textLength="70" lengthAdjust="spacingAndGlyphs" clip-path="url(#clipWork)">./work.sh</text>
  <rect class="cursor cursor9" x="38" y="272" width="8" height="15" />
  <text x="20" y="310" class="text out line l10">&gt; [1] Kiriko - companion :)</text>
  <text x="20" y="335" class="text out line l11">&gt; [2] Terminal Tools 42</text>

  <!-- idle prompt -->
  <text x="20" y="375" class="text prompt final-show">$ </text>
  <rect x="38" y="362" width="8" height="15" class="final-blink" />
</svg>
