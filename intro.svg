<svg xmlns="http://www.w3.org/2000/svg" width="400" height="40" viewBox="0 0 400 40">
  <style>
    .text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      fill: #8FBCBB; 
      font-weight: bold;
    }
    @keyframes blink {
      0%, 20% { opacity: 0; }
      40%, 100% { opacity: 1; }
    }
    .dot1 { animation: blink 1.5s infinite; animation-delay: 0s; }
    .dot2 { animation: blink 1.5s infinite; animation-delay: 0.5s; }
    .dot3 { animation: blink 1.5s infinite; animation-delay: 1.0s; }
  </style>
  <rect width="100%" height="100%" fill="transparent" />
  <text x="10" y="25" class="text">
    Click for more info
    <tspan class="dot1">.</tspan>
    <tspan class="dot2">.</tspan>
    <tspan class="dot3">.</tspan>
  </text>
</svg>
